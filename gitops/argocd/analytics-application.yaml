apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Pereira277/tc3-togglemaster.git
    targetRevision: main
    path: gitops/analytics
  destination:
    server: https://kubernetes.default.svc
    namespace: togglemaster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true