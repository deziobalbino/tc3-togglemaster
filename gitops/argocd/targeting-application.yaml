apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: targeting
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/deziobalbino/tc3-togglemaster.git
    targetRevision: main
    path: gitops/targeting
  destination:
    server: https://kubernetes.default.svc
    namespace: togglemaster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true