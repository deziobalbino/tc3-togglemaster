apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://open-telemetry.github.io/opentelemetry-helm-charts'
    targetRevision: '0.91.0'
    chart: opentelemetry-collector
    helm:
      releaseName: otel-collector
      values: |
        mode: deployment
        configMap:
          create: false
          existingName: otel-collector-conf
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true