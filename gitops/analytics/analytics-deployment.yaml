apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: togglemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: 654654629706.dkr.ecr.us-east-1.amazonaws.com/tc3-togglemaster-analytics:fd95920705b9bedd9c4d6f48d46e9a084d0f2bd0
          ports:
            - containerPort: 8005
          env:
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: PORT
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_SQS_URL
            - name: AWS_DYNAMODB_TABLE
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_DYNAMODB_TABLE
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: analytics-aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: analytics-aws-credentials
                  key: AWS_SESSION_TOKEN