apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: togglemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      containers:
        - name: flag-service
          image: 923654441009.dkr.ecr.us-east-1.amazonaws.com/tc3-togglemaster-flag:5d652c5c41fd80b1c8e8eac37f757bca143c7bd2
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DATABASE_URL
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: PORT
            - name: AUTH_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: AUTH_SERVICE_URL
            # ==========================================
            # CONFIGURAÇÕES DO OPENTELEMETRY
            # ==========================================
            - name: OTEL_SERVICE_NAME
              value: "flag-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production"