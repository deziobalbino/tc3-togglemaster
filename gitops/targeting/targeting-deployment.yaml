apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: togglemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
        - name: targeting-service
          image: 518900743906.dkr.ecr.us-east-1.amazonaws.com/tc3-togglemaster-targeting:f1a8466e8dbf36d5878741807bb2bca38e974a1a
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: DATABASE_URL
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: PORT
            - name: AUTH_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: AUTH_SERVICE_URL