apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-redis
  namespace: togglemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-redis
  template:
    metadata:
      labels:
        app: evaluation-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379